name: Deploy Wardly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Landing + Status → GitHub Pages (wardly.bridgr.co.in)
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p build

      - name: Copy landing page to root
        run: cp -r landing/. build/

      - name: Copy status page
        run: |
          mkdir -p build/status
          cp -r status/. build/status/

      - name: Add CNAME for custom domain
        run: echo "wardly.bridgr.co.in" > build/CNAME

      - name: Add .nojekyll
        run: touch build/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true

  # Flutter web → Firebase Hosting (wardlyapp.bridgr.co.in)
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "/" --no-tree-shake-icons

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:app --token "${{ secrets.FIREBASE_TOKEN }}"
