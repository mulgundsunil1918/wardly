name: Deploy Wardly to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p build

      - name: Copy landing page to root
        run: cp -r landing/. build/

      - name: Copy status page
        run: |
          mkdir -p build/status
          cp -r status/. build/status/

      - name: Add CNAME for custom domain
        run: echo "wardly.bridgr.co.in" > build/CNAME

      - name: Add .nojekyll
        run: touch build/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true
